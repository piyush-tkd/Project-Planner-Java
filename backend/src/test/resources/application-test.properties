# H2 in-memory database for tests — no PostgreSQL required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE,YEAR
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for unit tests — DDL is managed by Hibernate
spring.flyway.enabled=false

# JWT secret for tests (any 32+ char string is fine)
app.jwt.secret=test-secret-key-for-unit-tests-only-32chars
app.jwt.expiration-ms=3600000

# Silence unnecessary logging in tests
logging.level.org.hibernate.SQL=WARN
logging.level.com.portfolioplanner=WARN
