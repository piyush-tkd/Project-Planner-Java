spring:
  application:
    name: portfolio-planner
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_planner
    username: ${DB_USERNAME:piyushbaheti}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

# ── AI microservice (portfolio-planner-ai on :8081)
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8081}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    out-of-order: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=300s
  # ── Mail (weekly digest) ──────────────────────────────────────────────────────
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth:            true
          starttls.enable: true

server:
  port: 8080
  tomcat:
    connection-timeout: 120000   # 2 min for slow Jira API calls
  servlet:
    session:
      timeout: 30m
  error:
    include-stacktrace: never      # S2.1 — never leak stack traces to clients
    include-message: always        # keep human-readable message
    include-binding-errors: always # keep validation field errors

spring.mvc.async.request-timeout: 120000

jira:
  base-url: ${JIRA_BASE_URL:}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}

app:
  org-id: ${APP_ORG_ID:1}
  # Base URL of the frontend — used in email CTAs. Override via APP_FRONTEND_URL env var in production.
  frontend-base-url: ${APP_FRONTEND_URL:http://localhost:5173}
  smtp:
    # AES-256-GCM key used to encrypt the SMTP password at rest.
    # Override via SMTP_ENCRYPTION_KEY environment variable in production.
    # Changing this key requires re-saving the SMTP password in Admin → Settings → Notifications.
    encryption-key: ${SMTP_ENCRYPTION_KEY:changeme-replace-this-in-production}
  digest:
    enabled:    ${DIGEST_ENABLED:false}      # set true to activate weekly emails
    recipients: ${DIGEST_RECIPIENTS:}        # comma-separated list, e.g. pm@example.com
    from:       ${DIGEST_FROM:noreply@portfolioplanner}
    # cron: every Monday 08:00 (server local time)
    cron:       ${DIGEST_CRON:0 0 8 * * MON}
  jira-sync:
    interval-ms:      ${JIRA_SYNC_INTERVAL_MS:1800000}        # 30 min default
    initial-delay-ms: ${JIRA_SYNC_INITIAL_DELAY_MS:120000}    # 2 min after boot
  nlp:
    learner:
      interval-ms:      ${NLP_LEARNER_INTERVAL_MS:21600000}    # 6 hours default
      initial-delay-ms: ${NLP_LEARNER_INITIAL_DELAY_MS:60000}  # 1 min after boot

logging:
  level:
    com.portfolioplanner: DEBUG
